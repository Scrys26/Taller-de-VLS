  uo[3]: "q3"
  uo[4]: "q4"
  uo[5]: "q5"
  uo[6]: "q6"
  uo[7]: "q7"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

